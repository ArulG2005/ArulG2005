<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="250" viewBox="0 0 1000 250">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#161b22;#1a1e2e;#0d1117" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1a1e2e">
        <animate attributeName="stop-color" values="#1a1e2e;#2d1b4e;#1a1e2e;#0d2137" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#2d1b4e">
        <animate attributeName="stop-color" values="#2d1b4e;#0d1117;#2d1b4e;#1a1e2e" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05397">
        <animate attributeName="stop-color" values="#e05397;#FFD700;#00d2ff;#e05397" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#FFD700">
        <animate attributeName="stop-color" values="#FFD700;#00d2ff;#e05397;#FFD700" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00d2ff">
        <animate attributeName="stop-color" values="#00d2ff;#e05397;#FFD700;#00d2ff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="desc-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b949e">
        <animate attributeName="stop-color" values="#8b949e;#c9d1d9;#8b949e" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#c9d1d9">
        <animate attributeName="stop-color" values="#c9d1d9;#8b949e;#c9d1d9" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="250" fill="url(#bg-gradient)" rx="0"/>

  <!-- Animated wave at bottom -->
  <path fill="none" stroke="#e0539733" stroke-width="1.5">
    <animate attributeName="d" 
      values="M0,230 C150,210 350,240 500,220 C650,200 850,235 1000,215 L1000,250 L0,250 Z;
              M0,220 C150,240 350,210 500,230 C650,245 850,210 1000,225 L1000,250 L0,250 Z;
              M0,230 C150,210 350,240 500,220 C650,200 850,235 1000,215 L1000,250 L0,250 Z"
      dur="6s" repeatCount="indefinite"/>
  </path>
  <path fill="#e0539710">
    <animate attributeName="d" 
      values="M0,235 C200,215 400,245 500,225 C600,205 800,240 1000,220 L1000,250 L0,250 Z;
              M0,225 C200,245 400,215 500,235 C600,250 800,215 1000,230 L1000,250 L0,250 Z;
              M0,235 C200,215 400,245 500,225 C600,205 800,240 1000,220 L1000,250 L0,250 Z"
      dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Floating particles -->
  <circle cx="100" cy="60" r="1.5" fill="#e05397" opacity="0.6">
    <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="180" r="1" fill="#FFD700" opacity="0.5">
    <animate attributeName="cy" values="180;160;180" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="40" r="2" fill="#00d2ff" opacity="0.4">
    <animate attributeName="cy" values="40;25;40" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="200" r="1.5" fill="#e05397" opacity="0.5">
    <animate attributeName="cy" values="200;180;200" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="50" r="1" fill="#FFD700" opacity="0.6">
    <animate attributeName="cy" values="50;35;50" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="150" r="2" fill="#00d2ff" opacity="0.4">
    <animate attributeName="cy" values="150;130;150" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="130" r="1" fill="#FFD700" opacity="0.3">
    <animate attributeName="cy" values="130;115;130" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="100" r="1.5" fill="#e05397" opacity="0.5">
    <animate attributeName="cy" values="100;80;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="80" r="1" fill="#00d2ff" opacity="0.6">
    <animate attributeName="cy" values="80;65;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="200" r="1.5" fill="#FFD700" opacity="0.4">
    <animate attributeName="cy" values="200;185;200" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="35" r="1" fill="#e05397" opacity="0.5">
    <animate attributeName="cy" values="35;20;35" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="210" r="2" fill="#FFD700" opacity="0.3">
    <animate attributeName="cy" values="210;195;210" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Decorative orbital rings -->
  <ellipse cx="500" cy="105" rx="180" ry="8" fill="none" stroke="#e0539720" stroke-width="0.5" transform="rotate(-5, 500, 105)">
    <animate attributeName="rx" values="180;190;180" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="8;12;8" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="500" cy="105" rx="210" ry="10" fill="none" stroke="#FFD70015" stroke-width="0.5" transform="rotate(3, 500, 105)">
    <animate attributeName="rx" values="210;220;210" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="10;14;10" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Greeting emoji -->
  <text x="500" y="62" text-anchor="middle" font-size="22" opacity="0.9">
    👋
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Main Title -->
  <text x="500" y="110" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="800" fill="url(#text-gradient)" filter="url(#glow)" letter-spacing="2">
    Hey, I'm Arul!
  </text>

  <!-- Underline accent -->
  <line x1="370" y1="122" x2="630" y2="122" stroke="url(#text-gradient)" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <animate attributeName="x1" values="370;360;370" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="630;640;630" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Role / Description -->
  <text x="500" y="155" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="url(#desc-gradient)" filter="url(#soft-glow)" letter-spacing="1">
    Software Development Engineer  ·  Building Scalable Systems
  </text>

  <!-- Tech tags -->
  <g opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="5s" repeatCount="indefinite"/>
    <!-- Tag 1 -->
    <rect x="280" y="175" width="90" height="24" rx="12" fill="#e0539730" stroke="#e0539766" stroke-width="0.5"/>
    <text x="325" y="191" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="11" fill="#e05397">Backend</text>
    <!-- Tag 2 -->
    <rect x="385" y="175" width="100" height="24" rx="12" fill="#FFD70025" stroke="#FFD70055" stroke-width="0.5"/>
    <text x="435" y="191" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="11" fill="#FFD700">Full Stack</text>
    <!-- Tag 3 -->
    <rect x="500" y="175" width="105" height="24" rx="12" fill="#00d2ff25" stroke="#00d2ff55" stroke-width="0.5"/>
    <text x="553" y="191" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="11" fill="#00d2ff">Mobile Dev</text>
    <!-- Tag 4 -->
    <rect x="620" y="175" width="100" height="24" rx="12" fill="#e0539730" stroke="#e0539766" stroke-width="0.5"/>
    <text x="670" y="191" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="11" fill="#e05397">Cloud ☁️</text>
  </g>

  <!-- Corner decorations -->
  <path d="M0,0 L60,0 L0,60 Z" fill="#e0539710"/>
  <path d="M1000,0 L940,0 L1000,60 Z" fill="#FFD70010"/>
  <path d="M0,250 L60,250 L0,190 Z" fill="#00d2ff10"/>
  <path d="M1000,250 L940,250 L1000,190 Z" fill="#e0539710"/>
</svg>
